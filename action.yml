name: "Dust GitHub Action"
author: "Dust"
description: "Send data to your Dust workspace from GitHub Actions."

inputs:
  method:
    description: "Action to perform (upsert-skills, upsert-agent-configs)"
    required: true
  workspace-id:
    description: "Dust workspace ID"
    required: true
  api-key:
    description: "Dust API key"
    required: true
  region:
    description: "Dust workspace region (EU or US)"
    required: true
  agent-configs:
    description: "[upsert-agent-configs] List of glob patterns matching YAML agent configuration files"
    required: false

outputs:
  json:
    description: "Raw JSON response from the Dust API"
  imported:
    description: "Number of newly imported items"
  updated:
    description: "Number of updated items"

runs:
  using: "node24"
  main: "dist/index.js"
